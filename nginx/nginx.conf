worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  map $http_x_forwarded_proto $upstream_forwarded_proto {
    default $http_x_forwarded_proto;
    '' $scheme;
  }

  map $http_x_forwarded_port $upstream_forwarded_port {
    default $http_x_forwarded_port;
    '' $server_port;
  }

  sendfile on;
  keepalive_timeout 65;
  server_tokens off;
  client_max_body_size 5m;

  upstream legacy_service {
    server legacy-yii:8080;
  }

  upstream modern_service {
    server modern-node:4000;
  }

  upstream frontend_service {
    server frontend-next:3000;
  }

  server {
    listen 80;
    server_name _;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $upstream_forwarded_proto;
    proxy_set_header X-Forwarded-Port $upstream_forwarded_port;

    location /yii-legacy/ {
      proxy_http_version 1.1;
      proxy_connect_timeout 5s;
      proxy_read_timeout 120s;
      proxy_pass http://legacy_service/;
    }

    location /node-api/ {
      proxy_http_version 1.1;
      proxy_connect_timeout 5s;
      proxy_read_timeout 60s;
      proxy_pass http://modern_service/;
    }

    location /socket.io/ {
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 75s;
      proxy_send_timeout 75s;
      proxy_buffering off;
      proxy_pass http://modern_service;
    }

    include /etc/nginx/includes/*.conf;

    location / {
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 60s;
      proxy_pass http://frontend_service;
    }
  }
}
