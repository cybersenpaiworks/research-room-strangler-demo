services:
  mysql:
    build:
      context: ./mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - app_net

  postgres:
    build:
      context: ./postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - app_net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 5s
    networks:
      - app_net

  legacy-yii:
    build:
      context: ./legacy-yii
    restart: unless-stopped
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      LEGACY_SIMULATED_DELAY_MS: ${LEGACY_SIMULATED_DELAY_MS}
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php -r \"exit(@file_get_contents('http://127.0.0.1:8080/health') ? 0 : 1);\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    expose:
      - "8080"
    networks:
      - app_net

  modern-node:
    build:
      context: ./modern-node
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_PORT: 4000
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_URL: redis://redis:6379
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      SOCKET_IO_PATH: ${NEXT_PUBLIC_SOCKET_PATH}
      VIDEO_TOKEN_SECRET: ${VIDEO_TOKEN_SECRET}
      TRUST_PROXY: ${TRUST_PROXY}
      DEFAULT_SESSION_ID: ${DEFAULT_SESSION_ID}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4000/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    expose:
      - "4000"
    networks:
      - app_net

  frontend-next:
    build:
      context: ./frontend-next
      args:
        NEXT_PUBLIC_API_GATEWAY_URL: ${NEXT_PUBLIC_API_GATEWAY_URL}
        NEXT_PUBLIC_SOCKET_PATH: ${NEXT_PUBLIC_SOCKET_PATH}
        NEXT_PUBLIC_DEFAULT_SESSION_ID: ${NEXT_PUBLIC_DEFAULT_SESSION_ID}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    depends_on:
      modern-node:
        condition: service_healthy
      legacy-yii:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    expose:
      - "3000"
    networks:
      - app_net

  nginx:
    build:
      context: ./nginx
    restart: unless-stopped
    depends_on:
      legacy-yii:
        condition: service_healthy
      modern-node:
        condition: service_healthy
      frontend-next:
        condition: service_healthy
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      app_net:
      proxy_net:
        aliases:
          - research-room-strangler-gateway

volumes:
  mysql_data:
  postgres_data:
  redis_data:

networks:
  app_net:
    driver: bridge
  proxy_net:
    external: true
    name: proxy-network
